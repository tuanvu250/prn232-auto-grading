<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="980" viewBox="0 0 1480 980">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .entity { fill: #ffffff; stroke: #263238; stroke-width: 1.6; rx: 8; }
      .head { fill: #263238; }
      .title { fill: #ffffff; font: 700 16px Arial, sans-serif; }
      .field { fill: #263238; font: 14px Arial, sans-serif; }
      .pk { fill: #0f766e; font: 700 14px Arial, sans-serif; }
      .fk { fill: #b45309; font: 700 14px Arial, sans-serif; }
      .rel { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .reltext { fill: #334155; font: 13px Arial, sans-serif; }
      .note { fill: #475569; font: 14px Arial, sans-serif; }
      .caption { fill: #111827; font: 700 26px Arial, sans-serif; }
      .callout { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.4; rx: 8; }
      .calloutText { fill: #9a3412; font: 700 14px Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" width="1480" height="980" />
  <text x="40" y="50" class="caption">ERD đề xuất - Quản lý điểm PRN232 theo version bài nộp</text>
  <text x="40" y="78" class="note">Trong sơ đồ này, “đợt chấm” được hiểu là version/lần nộp của từng student cho từng lab.</text>

  <rect x="980" y="35" width="430" height="58" class="callout" />
  <text x="1000" y="60" class="calloutText">Deadline nằm ở CLASS_LABS</text>
  <text x="1000" y="82" class="note">Version bài nộp nằm ở SUBMISSION_VERSIONS</text>

  <!-- TERMS -->
  <g transform="translate(50,130)">
    <rect class="entity" width="250" height="180" />
    <rect class="head" width="250" height="42" rx="8" />
    <text x="16" y="27" class="title">TERMS</text>
    <text x="16" y="68" class="pk">PK id</text>
    <text x="16" y="94" class="field">code</text>
    <text x="16" y="120" class="field">name</text>
    <text x="16" y="146" class="field">course_code</text>
    <text x="16" y="172" class="field">start_date, end_date</text>
  </g>

  <!-- CLASSES -->
  <g transform="translate(410,115)">
    <rect class="entity" width="260" height="150" />
    <rect class="head" width="260" height="42" rx="8" />
    <text x="16" y="27" class="title">CLASSES</text>
    <text x="16" y="68" class="pk">PK id</text>
    <text x="16" y="94" class="fk">FK term_id</text>
    <text x="16" y="120" class="field">class_name</text>
  </g>

  <!-- LABS -->
  <g transform="translate(410,360)">
    <rect class="entity" width="260" height="180" />
    <rect class="head" width="260" height="42" rx="8" />
    <text x="16" y="27" class="title">LABS</text>
    <text x="16" y="68" class="pk">PK id</text>
    <text x="16" y="94" class="fk">FK term_id</text>
    <text x="16" y="120" class="field">lab_code</text>
    <text x="16" y="146" class="field">title</text>
    <text x="16" y="172" class="field">max_score</text>
  </g>

  <!-- STUDENTS -->
  <g transform="translate(410,690)">
    <rect class="entity" width="260" height="170" />
    <rect class="head" width="260" height="42" rx="8" />
    <text x="16" y="27" class="title">STUDENTS</text>
    <text x="16" y="68" class="pk">PK id</text>
    <text x="16" y="94" class="field">student_id</text>
    <text x="16" y="120" class="field">email</text>
    <text x="16" y="146" class="field">full_name</text>
  </g>

  <!-- CLASS_STUDENTS -->
  <g transform="translate(790,690)">
    <rect class="entity" width="270" height="170" />
    <rect class="head" width="270" height="42" rx="8" />
    <text x="16" y="27" class="title">CLASS_STUDENTS</text>
    <text x="16" y="68" class="pk">PK id</text>
    <text x="16" y="94" class="fk">FK class_id</text>
    <text x="16" y="120" class="fk">FK student_id</text>
    <text x="16" y="146" class="field">status</text>
  </g>

  <!-- CLASS_LABS -->
  <g transform="translate(790,240)">
    <rect class="entity" width="280" height="190" />
    <rect class="head" width="280" height="42" rx="8" />
    <text x="16" y="27" class="title">CLASS_LABS</text>
    <text x="16" y="68" class="pk">PK id</text>
    <text x="16" y="94" class="fk">FK class_id</text>
    <text x="16" y="120" class="fk">FK lab_id</text>
    <text x="16" y="146" class="field">deadline</text>
    <text x="16" y="172" class="field">status</text>
  </g>

  <!-- SUBMISSION_VERSIONS -->
  <g transform="translate(1170,200)">
    <rect class="entity" width="270" height="280" />
    <rect class="head" width="270" height="42" rx="8" />
    <text x="16" y="27" class="title">SUBMISSION_VERSIONS</text>
    <text x="16" y="68" class="pk">PK id</text>
    <text x="16" y="94" class="fk">FK class_lab_id</text>
    <text x="16" y="120" class="fk">FK student_id</text>
    <text x="16" y="146" class="field">version_no</text>
    <text x="16" y="172" class="field">version_type</text>
    <text x="16" y="198" class="field">source_url</text>
    <text x="16" y="224" class="field">score, status</text>
    <text x="16" y="250" class="field">details</text>
    <text x="16" y="276" class="field">submitted_at, graded_at</text>
  </g>

  <!-- RESUBMISSION_REQUESTS -->
  <g transform="translate(1170,620)">
    <rect class="entity" width="270" height="250" />
    <rect class="head" width="270" height="42" rx="8" />
    <text x="16" y="27" class="title">RESUBMISSION_REQUESTS</text>
    <text x="16" y="68" class="pk">PK id</text>
    <text x="16" y="94" class="fk">FK student_id</text>
    <text x="16" y="120" class="fk">FK class_lab_id</text>
    <text x="16" y="146" class="fk">FK source_version_id</text>
    <text x="16" y="172" class="fk">FK created_version_id</text>
    <text x="16" y="198" class="field">drive_link, note</text>
    <text x="16" y="224" class="field">status, admin_note</text>
    <text x="16" y="250" class="field">requested_at, completed_at</text>
  </g>

  <!-- Relationships -->
  <path class="rel" d="M300,190 C350,190 360,190 410,190" />
  <text x="328" y="178" class="reltext">1 học kỳ có nhiều lớp</text>

  <path class="rel" d="M300,250 C350,310 360,415 410,440" />
  <text x="320" y="350" class="reltext">1 học kỳ có nhiều lab</text>

  <path class="rel" d="M670,190 C720,190 740,290 790,315" />
  <text x="690" y="248" class="reltext">lớp được giao lab</text>

  <path class="rel" d="M670,450 C720,438 740,365 790,340" />
  <text x="690" y="430" class="reltext">lab giao cho lớp</text>

  <path class="rel" d="M670,775 C720,775 740,775 790,775" />
  <text x="706" y="762" class="reltext">student thuộc lớp</text>

  <path class="rel" d="M930,430 C930,545 910,620 910,690" />
  <text x="838" y="585" class="reltext">roster theo lớp</text>

  <path class="rel" d="M1070,335 C1110,335 1130,335 1170,335" />
  <text x="1095" y="315" class="reltext">lab được nộp nhiều version</text>

  <path class="rel" d="M670,775 C900,770 925,420 1170,360" />
  <text x="805" y="635" class="reltext">student có nhiều version</text>

  <path class="rel" d="M1305,480 C1305,530 1305,570 1305,620" />
  <text x="1320" y="552" class="reltext">request tạo version mới</text>

  <path class="rel" d="M670,810 C900,890 1060,780 1170,750" />
  <text x="820" y="858" class="reltext">student gửi yêu cầu</text>

  <path class="rel" d="M1070,380 C1125,470 1130,640 1170,720" />
  <text x="1090" y="590" class="reltext">yêu cầu theo lab được giao</text>
</svg>
